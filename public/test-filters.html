<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filtre Testi — TETZ2026</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .test-layout {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .test-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .test-panel h2 {
      font-size: 16px;
      margin-bottom: 12px;
    }
    .test-student {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .test-student strong { color: var(--text); }
    .test-meta { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
    pre {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      overflow-x: auto;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="test-layout">
    <header>
      <h1>Filtre Testi</h1>
      <p class="muted">filters.js bileşenini yerel sunucuda test edin (file:// çalışmaz).</p>
    </header>

    <div id="filters-container" class="test-panel"></div>

    <div class="test-panel">
      <h2>Aktif filtreler (onFilterChange)</h2>
      <pre id="filters-json">{}</pre>
    </div>

    <div class="test-panel">
      <h2>Filtrelenmiş öğrenciler</h2>
      <div id="student-list"></div>
    </div>
  </div>

  <script type="module">
    import { initFilters, applyFilters } from "./components/filters.js";

    const mockStudents = [
      { id: "1", ad: "Ayşe Yılmaz", okul: "Ankara Fen Lisesi", sinif: 11, ilgiAlanlari: ["yapay-zeka", "web-gelistirme"] },
      { id: "2", ad: "Mehmet Kaya", okul: "İstanbul Teknik Koleji", sinif: 10, ilgiAlanlari: ["robotik", "teknofest"] },
      { id: "3", ad: "Zeynep Demir", okul: "İzmir Anadolu Lisesi", sinif: 12, ilgiAlanlari: ["yapay-zeka", "veri-bilimi"] },
      { id: "4", ad: "Can Öztürk", okul: "Bursa Bilim Lisesi", sinif: 9, ilgiAlanlari: ["oyun-gelistirme"] },
      { id: "5", ad: "Elif Arslan", okul: "Ankara Fen Lisesi", sinif: 11, ilgiAlanlari: ["tasarim", "dijital-sanatlar"] },
      { id: "6", ad: "Burak Şahin", okul: "Antalya Anadolu Lisesi", sinif: 10, ilgiAlanlari: ["siber-guvenlik", "web-gelistirme"] },
      { id: "7", ad: "Selin Aydın", okul: "Eskişehir Fen Lisesi", sinif: 12, ilgiAlanlari: ["girisimcilik", "blokzincir"] },
      { id: "8", ad: "Emre Çelik", okul: "Trabzon Bilim Lisesi", sinif: 11, ilgiAlanlari: ["mobil-uygulama", "iot"] }
    ];

    const jsonEl = document.getElementById("filters-json");
    const listEl = document.getElementById("student-list");

    function renderList(students) {
      if (students.length === 0) {
        listEl.innerHTML = '<p class="muted">Eşleşen öğrenci yok.</p>';
        return;
      }
      listEl.innerHTML = students.map((s) => `
        <div class="test-student">
          <strong>${s.ad}</strong> — ${s.sinif}. sınıf
          <div class="test-meta">${s.okul} · ${(s.ilgiAlanlari || []).join(", ")}</div>
        </div>
      `).join("");
    }

    const filtersApi = await initFilters("filters-container", (filters) => {
      const filtered = applyFilters(mockStudents, filters);
      filtersApi.updateResultCount(filtered.length);
      jsonEl.textContent = JSON.stringify(filters, null, 2);
      renderList(filtered);
    });
  </script>
</body>
</html>
