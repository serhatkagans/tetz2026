<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TETZ2026 — Öğrencileri ilgi alanlarına göre bir araya getiren platform" />
  <title>TETZ2026 — Öğrenci Eşleştirme</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ana uygulama kabı -->
  <div id="app">
    <nav class="navbar" aria-label="Ana navigasyon">
      <div class="navbar-inner">
        <a class="navbar-brand" href="#">
          <span class="brand-mark" aria-hidden="true">T</span>
          <span class="brand-text">TETZ<span class="brand-accent">2026</span></span>
        </a>
        <ul class="navbar-links">
          <li><a href="#map-container">Harita</a></li>
          <li><a href="#content-area">Keşfet</a></li>
          <li><a href="#stats-bar">İstatistikler</a></li>
        </ul>
      </div>
    </nav>

    <header class="hero" id="app-header">
      <div class="hero-inner">
        <p class="hero-badge">Öğrenci Networking Platformu</p>
        <h1 class="hero-title">TETZ2026</h1>
        <p class="hero-lead">
          İlgi alanlarına göre seni en uygun öğrencilerle eşleştiren akıllı networking deneyimi.
        </p>
        <p class="hero-desc">
          Yapay zekadan robotiğe, ortak tutkularında yeni bağlantılar kur ve gerçek buluşmalar planla.
        </p>
      </div>
    </header>

    <main class="main-content">
      <div id="map-container" aria-label="Harita alanı"></div>
      <div id="content-area" aria-label="İçerik alanı"></div>
    </main>

    <footer id="stats-bar" class="stats-section" aria-label="Platform istatistikleri">
      <div class="stats-section-inner">
        <h2 class="stats-heading">Canlı İstatistikler</h2>
        <div id="stats-container" class="stats-grid"></div>
      </div>
    </footer>
  </div>

  <!--
    ADIM 1: Firebase bağlantısı
    Bu blok veritabanı ve giriş işlemlerini hazırlar.
    Diğer dosyalar window.tetz üzerinden erişir.
  -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      getDoc,
      getDocs,
      setDoc,
      addDoc,
      updateDoc,
      deleteDoc,
      query,
      where,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_w65kktgOnE2AUDQDU4OmoRmiYUvXfhg",
      authDomain: "tetz2026.firebaseapp.com",
      projectId: "tetz2026",
      storageBucket: "tetz2026.firebasestorage.app",
      messagingSenderId: "87940983220",
      appId: "1:87940983220:web:b38e5f28ace0576df06ae1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.tetz = {
      app,
      db,
      auth,
      firestore: {
        collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc,
        query, where, onSnapshot, serverTimestamp
      },
      authApi: { signInAnonymously, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    };
  </script>

  <!-- ADIM 2: Uygulama mantığı -->
  <script type="module" src="app.js"></script>

</body>
</html>
